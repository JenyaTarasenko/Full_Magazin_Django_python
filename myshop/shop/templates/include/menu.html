<nav class="bg-white shadow px-4 py-3 flex justify-between items-center">
    <!-- Логотип -->
    <div class="text-xl font-bold">MyShop</div>

    <!-- Меню -->
    <div class="flex items-center space-x-4">

        <!-- Другие ссылки -->
        <a href="/" class="text-gray-700 hover:text-indigo-600">Главная</a>
        <a href="/shop/" class="text-gray-700 hover:text-indigo-600">Каталог</a>

        <!-- Иконка аккаунта -->
        <div class="relative">
            <button id="user-menu-button" class="flex items-center space-x-1 focus:outline-none">
                <!-- Heroicon: User -->
                <svg class="w-6 h-6 text-gray-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5.121 17.804A9 9 0 1112 21a9 9 0 01-6.879-3.196z" />
                </svg>
            </button>

            <!-- Выпадающее меню -->
            <div id="user-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border rounded shadow-lg z-50">
                {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' %}" class="block px-4 py-2 hover:bg-gray-100">Профиль</a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="w-full text-left px-4 py-2 hover:bg-gray-100">Выйти</button>
                </form>
                {% else %}
                <a href="{% url 'accounts:login' %}" class="block px-4 py-2 hover:bg-gray-100">Войти</a>
                <a href="{% url 'accounts:signup' %}" class="block px-4 py-2 hover:bg-gray-100">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<script>
    const button = document.getElementById('user-menu-button');
    const menu = document.getElementById('user-menu');

    button.addEventListener('click', () => {
        menu.classList.toggle('hidden');
    });

    // Закрытие меню при клике вне
    document.addEventListener('click', (e) => {
        if (!button.contains(e.target) && !menu.contains(e.target)) {
            menu.classList.add('hidden');
        }
    });
</script>
