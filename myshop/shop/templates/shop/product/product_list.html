{% extends "shop/base.html" %}
{% load static %}

{% block content %}
<div class="mt-[120px]">
    <!-- Вывод категорий товара  -->

    {% for c in categories %}

    <li>
        <a href="{{ c.get_absolute_url }}">
            {{ c.name }}
        </a>
    </li>

    {% endfor %}
    <!-- Вывод категорий товара  -->
    <!-- вывод продуктов -->
    {% for product in products %}
    <div class="item">
        <a href="{{ product.get_absolute_url }}">
            <img src="{{ product.image.url }}" style="width: 300px; height: 300px; object-fit: cover;">
        </a>
        <a href="{{ product.get_absolute_url }}">{{ product.name }}</a>
        <br>
        ${{ product.price }}
    </div>
    {% endfor %}
</div>

{% endblock %}
